<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Girişi — Stinga Enerji</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--g:#11855B;--g-l:#15a070;--n-dp:#141b38;--s1:#1a2240;--s2:#212d52;--bdr:rgba(255,255,255,.09);--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--n-dp);color:#fff;font-family:var(--fb);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(17,133,91,.1) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 70%,rgba(47,60,110,.5) 0%,transparent 60%);pointer-events:none}
.login-box{background:var(--s1);border:1px solid var(--bdr);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:2}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo img{width:52px;height:52px;border-radius:50%;object-fit:cover}
.login-logo-t{font-family:var(--fd);font-weight:800;font-size:1.3rem;line-height:1.1}
.login-logo-s{font-size:.65rem;color:var(--g-l);letter-spacing:.08em;text-transform:uppercase}
h2{font-family:var(--fd);font-size:1.5rem;font-weight:800;margin-bottom:6px;text-align:center}
.sub{font-size:.85rem;color:rgba(255,255,255,.45);text-align:center;margin-bottom:28px}
.fg{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
label{font-size:.8rem;font-weight:500;color:rgba(255,255,255,.5)}
input{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:13px 16px;color:#fff;font-family:var(--fb);font-size:.9rem;width:100%;outline:none;transition:border-color .25s}
input::placeholder{color:rgba(255,255,255,.25)}
input:focus{border-color:var(--g)}
.btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:10px;padding:14px;font-family:var(--fb);font-size:.95rem;font-weight:500;cursor:pointer;transition:all .25s;margin-top:8px}
.btn:hover{background:var(--g-l);transform:translateY(-1px);box-shadow:0 10px 28px rgba(17,133,91,.35)}
.err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.25);border-radius:9px;padding:11px 14px;font-size:.84rem;color:#f87171;margin-bottom:16px}
.hint{font-size:.77rem;color:rgba(255,255,255,.3);text-align:center;margin-top:20px}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Stinga">
    <div><div class="login-logo-t">STİNGA</div><div class="login-logo-s">Admin Panel</div></div>
  </div>
  <h2>Yönetim Girişi</h2>
  <p class="sub">Devam etmek için giriş yapın</p>
  {% if error %}<div class="err">⚠ {{ error }}</div>{% endif %}
  <form method="POST">
    <div class="fg">
      <label>Kullanıcı Adı</label>
      <input type="text" name="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="fg">
      <label>Şifre</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Giriş Yap →</button>
  </form>
  <p class="hint">Varsayılan: admin / stinga2024</p>
</div>
</body>
</html>
