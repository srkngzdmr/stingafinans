{% extends "admin/base_admin.html" %}
{% block page_title %}Şifre Değiştir{% endblock %}
{% block admin_content %}
<div style="max-width:420px">
  <div class="panel">
    <div class="panel-head"><h3>Şifre Değiştir</h3></div>
    <div class="panel-body">
      {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Mevcut Şifre</label>
          <input type="password" name="old_password" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Yeni Şifre</label>
          <input type="password" name="new_password" class="form-input" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">🔑 Güncelle</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
